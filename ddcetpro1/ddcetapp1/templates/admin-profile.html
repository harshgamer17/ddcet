{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Profile | DDCET</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/profile.css' %}">

        <!-- RESPONSIVE PAGE -->
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>
    <h1>DDCET: A Competitive Assessment & Management portal</h1>
</header>

<nav class="navbar">
    <ul class="navbar-left">
        <li><a href="{% url 'admin_dashboard' %}">Dashboard</a></li>
        <li><a href="{% url 'admin_students' %}">Students</a></li>
        <li><a href="{% url 'admin_subjects' %}">Subjects</a></li>
        <li><a href="#">Results</a></li>
    </ul>

    <ul class="navbar-right">
        <li>
            <a class="admin-btn" href="{% url 'admin_profile' %}">
                <i class="fa fa-user"></i>
                {{ request.user.first_name|default:request.user.username }}
            </a>
        </li>
    </ul>
</nav>

<div class="background-slider"></div>

<div class="container">
    <h2>Admin Profile</h2>
    <p>Administrator account details</p>

    <div class="profile-card">

        <div class="profile-left">
            <i class="fas fa-user-shield"></i>
            <h3>{{ request.user.username }}</h3>
            <span>Administrator</span>
        </div>

        <div class="profile-right">
            <div class="profile-field">
                <label>Username</label>
                <input type="text" value="{{ request.user.username }}" disabled>
            </div>

            <div class="profile-field">
                <label>Email</label>
                <input type="text" value="{{ request.user.email }}" disabled>
            </div>

            <div class="profile-field">
                <label>Role</label>
                <input type="text" value="Admin" disabled>
            </div>

            <div class="profile-field">
                <label>Status</label>
                <input type="text" value="Superuser" disabled>
            </div>
        </div>

    </div>

    <div class="profile-actions">
        <a href="{% url 'admin_dashboard' %}">
            <button class="logout">Back to Home</button>
        </a>
    </div>
</div>

</body>
</html>
