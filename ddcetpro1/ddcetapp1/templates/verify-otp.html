{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP | DDCET</title>

    <link rel="stylesheet" href="{% static 'css/verify-otp.css' %}">
    <!-- RESPONSIVE PAGE -->
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
</head>
<body>

<div class="otp-container">

    <div class="otp-box">
        <h2>Verify OTP</h2>
        <p class="subtitle">Enter the 6-digit OTP sent to your email</p>

        <div class="timer">
            Time Remaining:
            <span id="countdown">{{ remaining_time }}</span> sec
        </div>

        <form method="post" id="otpForm">
            {% csrf_token %}

            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-digit" autofocus>
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
            </div>

            <input type="hidden" name="otp" id="fullOtp">

            <button type="submit">Verify OTP</button>
        </form>

        <div class="resend-wrapper">
            <button id="resendBtn" onclick="resendOTP()">Resend OTP</button>
        </div>

    </div>

</div>

<!-- MODAL -->
<div id="popupModal" class="modal">
    <div class="modal-content">
        <p id="popupMessage"></p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>

/* ================= TIMER ================= */

let timeLeft = {{ remaining_time|default:0 }};
const countdownElement = document.getElementById("countdown");
const resendBtn = document.getElementById("resendBtn");

function updateTimer() {
    if (timeLeft <= 0) {
        countdownElement.innerText = "0";
        resendBtn.disabled = false;
        resendBtn.style.opacity = "1";
        return;
    }
    countdownElement.innerText = timeLeft;
    timeLeft--;
    setTimeout(updateTimer, 1000);
}
updateTimer();

/* ================= RESEND OTP ================= */

function resendOTP() {

    resendBtn.disabled = true;
    resendBtn.style.opacity = "0.6";

    fetch("{% url 'resend_otp' %}")
    .then(response => response.json())
    .then(data => {

        if (data.status === "success") {
            showModal("New OTP sent to your email.");
            timeLeft = data.remaining_time;
            updateTimer();
        } else {
            showModal("Error: " + data.message);
        }

    })
    .catch(() => {
        showModal("Something went wrong.");
    });
}

/* ================= MODAL ================= */

function showModal(message) {
    document.getElementById("popupMessage").innerText = message;
    document.getElementById("popupModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("popupModal").style.display = "none";
}

/* ================= OTP INPUT LOGIC ================= */
const otpInputs = document.querySelectorAll(".otp-digit");
const fullOtpInput = document.getElementById("fullOtp");
const form = document.getElementById("otpForm");

otpInputs.forEach((input, index) => {

    input.addEventListener("input", () => {

        input.value = input.value.replace(/[^0-9]/g, "");

        if (input.value.length === 1 && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
        }

        updateFullOtp();
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && input.value === "" && index > 0) {
            otpInputs[index - 1].focus();
        }
    });

});

function updateFullOtp() {
    fullOtpInput.value = getOtpValue();
}

function getOtpValue() {
    return Array.from(otpInputs).map(input => input.value).join("");
}

form.addEventListener("submit", function(e) {
    updateFullOtp();

    if (fullOtpInput.value.length !== 6) {
        e.preventDefault();
        showModal("Please enter complete 6-digit OTP.");
    }
});
function updateFullOtp() {
    fullOtpInput.value = getOtpValue();
}

function getOtpValue() {
    return Array.from(otpInputs).map(input => input.value).join("");
}

</script>

</body>
</html>
